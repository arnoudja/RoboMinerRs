# fail2ban jail for RoboMiner login abuse.
#
# Prefer the application journal (stable auth_failure lines). Fallback to proxy
# access logs when journal matching is unavailable.
#
#   systemd journal (recommended):
#     backend = systemd
#     journalmatch = _SYSTEMD_UNIT=robominer-web.service
#
#   nginx: /var/log/nginx/access.log
#   Caddy: /var/log/caddy/access.log (enable access logging in Caddyfile if needed)

[robominer-login]
enabled = true
port = http,https
filter = robominer-login
backend = systemd
journalmatch = _SYSTEMD_UNIT=robominer-web.service
# logpath = /var/log/nginx/access.log
maxretry = 10
findtime = 600
bantime = 3600
