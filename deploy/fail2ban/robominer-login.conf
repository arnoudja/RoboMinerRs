# fail2ban filter for RoboMiner failed login attempts.
#
# Matches POST /login (case-insensitive) with HTTP 200 responses that return the
# login form again (failed auth). Tune maxretry/findtime in the jail.
#
# Install:
#   sudo cp deploy/fail2ban/robominer-login.conf /etc/fail2ban/filter.d/
#   sudo cp deploy/fail2ban/robominer-jail.conf /etc/fail2ban/jail.d/robominer.local
#   sudo systemctl reload fail2ban

[Definition]
failregex = ^<HOST> -.*"(?:GET|POST) /[Ll]ogin.*" 200
ignoreregex =
