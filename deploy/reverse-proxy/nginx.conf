# Example nginx site for RoboMiner (hardened).
#
# Install:
#   sudo cp deploy/reverse-proxy/nginx.conf /etc/nginx/sites-available/robominer.conf
#   sudo ln -s /etc/nginx/sites-available/robominer.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace robominer.example.com and the certificate paths before use.

limit_req_zone $binary_remote_addr zone=robominer_login:10m rate=5r/m;

server {
	listen 80;
	server_name robominer.example.com;
	return 301 https://$host$request_uri;
}

server {
	listen 443 ssl;
	http2 on;
	server_name robominer.example.com;

	ssl_certificate     /etc/ssl/certs/robominer.example.com.fullchain.pem;
	ssl_certificate_key /etc/ssl/private/robominer.example.com.key;

	add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
	add_header X-Content-Type-Options "nosniff" always;
	add_header X-Frame-Options "SAMEORIGIN" always;
	add_header Referrer-Policy "strict-origin-when-cross-origin" always;

	location / {
		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	# Rate-limit login and sign-up POSTs (router accepts /login and /Login).
	location ~* ^/login$ {
		limit_req zone=robominer_login burst=3 nodelay;
		limit_req_status 429;

		proxy_pass http://127.0.0.1:8080;
		proxy_http_version 1.1;
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}
}
